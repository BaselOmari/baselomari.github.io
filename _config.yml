title: Basel Omari
description: Personal blog — thoughts on ML, engineering, and building things from scratch.
url: "https://baselomari.github.io"
baseurl: ""

theme: minima

author:
  name: Basel Omari

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
