baseURL: "https://baselomari.github.io/"
languageCode: en-us
title: Bassel Al-Omari
theme: PaperMod

pagination:
  pagerSize: 10

params:
  env: production
  description: "Personal blog — thoughts on ML, engineering, and building things from scratch."
  author: Bassel Al Omari
  defaultTheme: auto
  showReadingTime: true
  showShareButtons: false
  showPostNavLinks: true
  showBreadCrumbs: true
  showCodeCopyButtons: true
  showToc: true

  homeInfoParams:
    Title: "Hi, I'm Bassel"
    Content: "I build things and write about them here. Currently interested in ML, systems, and understanding how things work from the ground up."

  socialIcons:
    - name: github
      url: "https://github.com/baselomari"
    - name: linkedin
      url: "https://www.linkedin.com/in/baselomari/"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=4EEtql8AAAAJ&hl=en&authuser=1"

  math: true

markup:
  highlight:
    style: monokai
    lineNos: false
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - ["$$", "$$"]
            - ["\\[", "\\]"]
          inline:
            - ["$", "$"]
            - ["\\(", "\\)"]
        enable: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main: []
